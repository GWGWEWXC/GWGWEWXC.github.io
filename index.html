<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AR 诗句粒子交互系统</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; background: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #video-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); opacity: 1; }
        
        /* 加载与状态提示样式 */
        #loading-panel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 100; text-align: center; color: white; width: 80%;
        }
        #loading-text { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 5px black; }
        #error-log { 
            font-size: 14px; color: #ff6b6b; background: rgba(0,0,0,0.8); 
            padding: 10px; border-radius: 5px; text-align: left; display: none; 
            max-height: 200px; overflow-y: auto; border: 1px solid #ff6b6b;
        }

        #instruction { 
            position: absolute; top: 20px; left: 20px; z-index: 3; 
            background: rgba(0,0,0,0.5); color: white; padding: 15px; border-radius: 12px; 
            pointer-events: none; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
        }
    </style>
    <!-- 引入库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading-panel">
        <div id="loading-text">正在初始化...<br><span style="font-size:16px; font-weight:normal;">请允许摄像头权限 (首次加载需10-20秒)</span></div>
        <div id="error-log"></div>
    </div>

    <div id="instruction">
        <p>👋 <b>互动</b>: 手指触碰文字产生水波涟漪</p>
        <p>🖐 <b>左手</b> (切换诗句): <br>
           1指: 胡琴声下...<br>
           2指: 柳枝梢上...<br>
           3指: 以上韵脚...<br>
           4指: 真是瑕迹...</p>
        <p>✋ <b>右手</b>: 张开/捏合 控制粒子炸裂</p>
    </div>

    <video id="video-input" playsinline></video>
    <div id="canvas-container"></div>

<script>
    // --- 错误日志工具 ---
    function logError(msg) {
        const el = document.getElementById('error-log');
        const loadText = document.getElementById('loading-text');
        el.style.display = 'block';
        el.innerHTML += `> ${msg}<br>`;
        loadText.innerText = "发生错误，请检查下方日志：";
        console.error(msg);
    }

    if (window.location.protocol === 'file:') {
        logError("请勿直接双击 HTML 文件！请使用 Live Server 或本地服务器运行。");
    }

    // --- 1. Three.js 初始化 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
    camera.position.z = 130; // 稍微拉远一点，容纳更长的句子

    let vFOV = THREE.MathUtils.degToRad(camera.fov);
    let visibleHeight = 2 * Math.tan(vFOV / 2) * camera.position.z;
    let visibleWidth = visibleHeight * (window.innerWidth / window.innerHeight);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // --- 2. 粒子设置 ---
    function getTexture() {
        const c = document.createElement('canvas');
        c.width = 32; c.height = 32;
        const ctx = c.getContext('2d');
        const g = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        g.addColorStop(0, 'rgba(255,255,255,1)');
        g.addColorStop(0.5, 'rgba(255,255,255,0.6)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.fillRect(0,0,32,32);
        return new THREE.CanvasTexture(c);
    }

    // 增加粒子数量以适应复杂汉字
    const COUNT = 20000; 
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(COUNT * 3);
    const tar = new Float32Array(COUNT * 3);
    
    // 初始化位置归零，隐藏位修正
    for(let i=0; i<COUNT; i++) { 
        pos[i*3]=0; pos[i*3+1]=0; pos[i*3+2]=0;
        tar[i*3]=0; tar[i*3+1]=0; tar[i*3+2]=0;
        
        // 初始全部隐藏到背后，防止黑点
        pos[i*3+2]=5000; 
        tar[i*3+2]=5000; 
    }

    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    
    const mat = new THREE.PointsMaterial({
        size: 3.2, map: getTexture(), 
        color: 0x00ffff, transparent: true, opacity: 0.9, 
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    const particles = new THREE.Points(geo, mat);
    scene.add(particles);

    // --- 3. 文字生成逻辑 ---
    function updateText(text) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        // 加宽画布以容纳长句
        const W = 800, H = 300; 
        canvas.width = W; canvas.height = H;
        
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
        
        // 根据字数自动调整大小
        ctx.font = 'bold 80px "Microsoft YaHei"';
        if(text.length > 5) ctx.font = 'bold 65px "Microsoft YaHei"'; // 7字诗句用这个大小
        
        ctx.fillStyle = '#fff'; 
        ctx.textAlign='center'; 
        ctx.textBaseline='middle';
        ctx.fillText(text, W/2, H/2);
        
        const data = ctx.getImageData(0,0,W,H).data;
        const coords = [];
        const gap = 2; // 采样间隙

        for(let y=0; y<H; y+=gap) {
            for(let x=0; x<W; x+=gap) {
                if(data[(y*W+x)*4] > 128) {
                    coords.push({
                        x: (x - W/2) * 0.55, // 适当缩放以适应屏幕
                        y: -(y - H/2) * 0.55
                    });
                }
            }
        }

        const p = geo.attributes.position.array;
        for(let i=0; i<COUNT; i++) {
            if(i < coords.length) {
                tar[i*3] = coords[i].x;
                tar[i*3+1] = coords[i].y;
                tar[i*3+2] = 0;
            } else {
                tar[i*3+2] = 5000; // 隐藏多余粒子
            }
        }
        
        // 第一次运行时强制归位
        if(firstRun) {
            for(let i=0; i<COUNT*3; i++) p[i] = tar[i];
            firstRun = false;
        }
    }

    let firstRun = true;
    let currentText = "胡琴声下梦成真"; // 默认第一句
    updateText(currentText);

    // --- 4. MediaPipe & 摄像头 ---
    const video = document.getElementById('video-input');
    let scatter = 0;
    let points = [];
    let isLoaded = false;

    setTimeout(() => {
        if (!isLoaded) logError("加载超时，请检查网络或摄像头权限。");
    }, 15000);

    function onResults(results) {
        if (!isLoaded) {
            isLoaded = true;
            document.getElementById('loading-panel').style.display = 'none';
        }

        points = [];
        let newScatter = 0;

        if (results.multiHandLandmarks) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const lm = results.multiHandLandmarks[i];
                const label = results.multiHandedness[i].label;
                
                // 交互点映射
                const tip = lm[8]; // 食指尖
                points.push({
                    x: (0.5 - tip.x) * visibleWidth,
                    y: (0.5 - tip.y) * visibleHeight
                });

                if (label === 'Left') {
                    // 左手：数手指切换内容
                    let c = 0;
                    if(lm[8].y < lm[6].y) c++;
                    if(lm[12].y < lm[10].y) c++;
                    if(lm[16].y < lm[14].y) c++;
                    if(lm[20].y < lm[18].y) c++;

                    let t = currentText;
                    // --- 这里的文字已经更新 ---
                    if(c===1) t="胡琴声下梦成真";
                    else if(c===2) t="柳枝梢上雪亦洁";
                    else if(c===3) t="以上韵脚全无序";
                    else if(c===4) t="真是瑕迹把峦变";
                    
                    if(t!==currentText) { 
                        currentText=t; 
                        updateText(t); 
                    }
                }
                if (label === 'Right') {
                    // 右手：控制炸裂
                    const d = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
                    newScatter = Math.max(0, (d-0.05)*800);
                }
            }
        }
        scatter += (newScatter - scatter) * 0.1;
    }

    try {
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const cameraUtils = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 640, height: 480
        });

        cameraUtils.start().catch(err => logError("摄像头启动失败: " + err.message));
    } catch (e) {
        logError("初始化失败: " + e.message);
    }

    // --- 5. 动画循环 ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();
        const p = geo.attributes.position.array;
        
        for(let i=0; i<COUNT; i++) {
            const idx = i*3;
            // 优化性能：如果目标位置在极远处(隐藏)，直接跳过物理计算
            if (tar[idx+2] > 1000) { 
                p[idx] = 0; p[idx+1] = 0; p[idx+2] = 5000; 
                continue; 
            }

            let tx = tar[idx], ty = tar[idx+1], tz = tar[idx+2];
            
            // 炸裂效果
            if(scatter > 1) {
                tx += Math.sin(time*5+i)*scatter;
                ty += Math.cos(time*3+i)*scatter;
                tz += Math.sin(time*2+i)*scatter;
            }

            // 归位 (Lerp)
            p[idx] += (tx - p[idx]) * 0.15;
            p[idx+1] += (ty - p[idx+1]) * 0.15;
            p[idx+2] += (tz - p[idx+2]) * 0.15;

            // 水波交互 (斥力)
            for(let pt of points) {
                const dx = p[idx]-pt.x;
                const dy = p[idx+1]-pt.y;
                const d2 = dx*dx + dy*dy;
                if(d2 < 900) { // 半径30的平方
                    const dist = Math.sqrt(d2);
                    const f = (30 - dist) / 30; // 力度衰减
                    const a = Math.atan2(dy, dx);
                    p[idx] += Math.cos(a)*f*8;
                    p[idx+1] += Math.sin(a)*f*8;
                    p[idx+2] += f*15; // Z轴隆起
                }
            }
        }
        geo.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        vFOV = THREE.MathUtils.degToRad(camera.fov);
        visibleHeight = 2 * Math.tan(vFOV/2) * camera.position.z;
        visibleWidth = visibleHeight * camera.aspect;
    };
    
    animate();

</script>
</body>
</html>
