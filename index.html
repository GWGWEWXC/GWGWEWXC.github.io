<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 物联网监控</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 引入 MQTT.js (关键修改) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🏠 ESP32 实时监控</h1>
        
        <!-- 仪表盘区域 -->
        <div class="dashboard">
            <div class="gauge-card">
                <h3>温度</h3>
                <div id="tempGauge" class="gauge-chart"></div>
                <div class="value-display" id="tempValue">-- °C</div>
            </div>
            <div class="gauge-card">
                <h3>湿度</h3>
                <div id="humiGauge" class="gauge-chart"></div>
                <div class="value-display" id="humiValue">-- %</div>
            </div>
            <div class="gauge-card">
                <h3>光强</h3>
                <div id="lightGauge" class="gauge-chart"></div>
                <div class="value-display" id="lightValue">--</div>
            </div>
            <div class="gauge-card">
                <h3>雨滴</h3>
                <div id="rainGauge" class="gauge-chart"></div>
                <div class="value-display" id="rainValue">--</div>
            </div>
            <div class="gauge-card">
                <h3>烟雾</h3>
                <div id="smokeGauge" class="gauge-chart"></div>
                <div class="value-display" id="smokeValue">--</div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="chart-container">
            <h2>📊 实时温湿度趋势 (内存缓存)</h2>
            <div id="tempHumiChart" style="width: 100%; height: 300px;"></div>
        </div>
        
        <div class="chart-container">
            <h2>📊 实时传感器趋势 (内存缓存)</h2>
            <div id="sensorChart" style="width: 100%; height: 300px;"></div>
        </div>
        
        <!-- 控制区域 -->
        <div class="control-panel">
            <h2>🎛️ 电机控制</h2>
            <div class="control-item">
                <button id="motorOn" class="btn btn-success">开启电机</button>
                <button id="motorOff" class="btn btn-danger">关闭电机</button>
                <span id="motorStatus" class="status">状态：未知</span>
            </div>
        </div>

        <!-- 连接状态 -->
        <div class="connection-status">
            <span>MQTT 连接状态：</span>
            <span id="statusIndicator" class="indicator disconnected">未连接</span>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
